name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PDM
        run: pip install pdm

      - name: Install dependencies
        run: pdm install

      - name: Dependency audit (pip-audit)
        run: |
          pdm export -f requirements --without-hashes -o /tmp/requirements-audit.txt
          pdm run pip-audit -r /tmp/requirements-audit.txt

      - name: Ruff
        run: pdm run python -m ruff check src tests app worker scripts mcp_server

      # Postgres-backed tests: run locally with DATABASE_URL + migrations (see db/README.md).
      - name: Tests
        run: |
          pdm run python -m pytest -v --tb=short \
            -m "not integration" \
            --cov=app/services \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage.xml
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-app-services
          path: coverage.xml
          if-no-files-found: ignore

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install and test web
        run: |
          npm ci
          npm audit --audit-level=high
          npx playwright install chromium
          npm run build
          npm run test:unit
          npm run test:e2e
          npm run test:e2e:api-mock
