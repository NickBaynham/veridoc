services:
  app:
    build: .
    image: veridoc:local
    env_file:
      - path: .env
        required: false
    environment:
      VERIDOC_CONFIG_DIR: /app/config
    volumes:
      - ./config:/app/config:ro
    command: ["pdm", "run", "python", "-m", "veridoc"]

  test:
    build: .
    image: veridoc:local
    profiles:
      - test
    env_file:
      - path: .env
        required: false
    environment:
      VERIDOC_CONFIG_DIR: /app/config
    volumes:
      - ./config:/app/config:ro
    command: ["pdm", "run", "pytest"]
