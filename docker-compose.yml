# Local development stack: PostgreSQL, Redis, MinIO (S3-compatible), OpenSearch + Dashboards,
# VerifiedSignal API + worker, optional **scoring-service** (sibling repo), and static **web** UI.
# `docker compose up` starts all services except `test` (profile: test).
#
# **Scoring service:** build context defaults to `../scoring-service` (sibling of this repo). Override with
# `SCORING_SERVICE_REPO` in `.env`. Set `OPENAI_API_KEY` for real LLM scoring. Use the same secret for
# `SCORE_HTTP_BEARER_TOKEN` (worker) and scoring-service `VERIFIEDSIGNAL_HTTP_BEARER_TOKEN` (set below).
#
# **Web UI:** SPA is built with `VITE_API_URL` pointing at the host-mapped API (default `http://127.0.0.1:8000`).
# Override with `WEB_VITE_API_URL` when building if `API_PORT` is not 8000.
#
# Compose loads a root `.env` for variable substitution. If that file sets `DATABASE_URL` or `REDIS_URL`
# to `localhost` (for host-run `make api-local`), those values override the defaults below and break
# `app` / `worker` *inside* containers. For full-stack Compose, either omit those keys in `.env` or set
# hosts to `postgres`, `redis`, `minio`, `opensearch` as in the defaults.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-verifiedsignal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-verifiedsignal}
      POSTGRES_DB: ${POSTGRES_DB:-verifiedsignal}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-verifiedsignal} -d ${POSTGRES_DB:-verifiedsignal}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  opensearch:
    image: opensearchproject/opensearch:2.17.1
    environment:
      - discovery.type=single-node
      # Local dev only: turn off the security plugin (avoids OPENSEARCH_INITIAL_ADMIN_PASSWORD flow).
      - DISABLE_SECURITY_PLUGIN=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "${OPENSEARCH_PORT:-9200}:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9200 >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.17.1
    depends_on:
      opensearch:
        condition: service_healthy
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    ports:
      - "${OPENSEARCH_DASHBOARDS_PORT:-5601}:5601"

  # --- Scoring service (VerifiedSignal HTTP scorer + native async API) ---
  scoring-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: scoring
      POSTGRES_PASSWORD: scoring
      POSTGRES_DB: scoring
    volumes:
      - scoring_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scoring -d scoring"]
      interval: 5s
      timeout: 5s
      retries: 10

  scoring-service:
    build:
      context: ${SCORING_SERVICE_REPO:-../scoring-service}
      dockerfile: docker/api.Dockerfile
    image: scoring-service:local
    depends_on:
      scoring-postgres:
        condition: service_healthy
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql+asyncpg://scoring:scoring@scoring-postgres:5432/scoring
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      MODEL_NAME: ${SCORING_MODEL_NAME:-gpt-4o-mini}
      LOG_LEVEL: ${SCORING_LOG_LEVEL:-INFO}
      JOB_QUEUE_BACKEND: database
      VERIFIEDSIGNAL_HTTP_BEARER_TOKEN: ${SCORE_HTTP_BEARER_TOKEN:-changeme-scoring-bearer}
    ports:
      - "${SCORING_SERVICE_PORT:-8010}:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    command:
      [
        "sh",
        "-c",
        "pdm run alembic upgrade head && exec pdm run uvicorn app.main:app --host 0.0.0.0 --port 8000",
      ]

  app:
    build: .
    image: verifiedsignal:local
    # So SUPABASE_URL can use host.docker.internal to reach `supabase start` on the host (Linux too).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      PYTHONPATH: /app
      VERIFIEDSIGNAL_CONFIG_DIR: /app/config
      DATABASE_URL: ${DATABASE_URL:-postgresql://verifiedsignal:verifiedsignal@postgres:5432/verifiedsignal}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      VERIFIEDSIGNAL_ARQ_QUEUE: ${VERIFIEDSIGNAL_ARQ_QUEUE:-verifiedsignal:jobs}
      USE_FAKE_QUEUE: ${USE_FAKE_QUEUE:-false}
      USE_FAKE_EVENT_HUB: ${USE_FAKE_EVENT_HUB:-false}
      EVENT_PUBSUB_CHANNEL: ${EVENT_PUBSUB_CHANNEL:-verifiedsignal:sse}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-verifiedsignal}
      OPENSEARCH_URL: ${OPENSEARCH_URL:-http://opensearch:9200}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://127.0.0.1:5173,http://localhost:5173,http://127.0.0.1:8000,http://localhost:8000}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./config:/app/config:ro
    command: ["pdm", "run", "api-prod"]

  worker:
    build: .
    image: verifiedsignal:local
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      scoring-service:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      PYTHONPATH: /app
      VERIFIEDSIGNAL_CONFIG_DIR: /app/config
      # Match `app` so the worker resolves Postgres/MinIO/OpenSearch by Compose DNS (not host .env localhost).
      DATABASE_URL: ${DATABASE_URL:-postgresql://verifiedsignal:verifiedsignal@postgres:5432/verifiedsignal}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      VERIFIEDSIGNAL_ARQ_QUEUE: ${VERIFIEDSIGNAL_ARQ_QUEUE:-verifiedsignal:jobs}
      USE_FAKE_QUEUE: ${USE_FAKE_QUEUE:-false}
      USE_FAKE_EVENT_HUB: ${USE_FAKE_EVENT_HUB:-false}
      EVENT_PUBSUB_CHANNEL: ${EVENT_PUBSUB_CHANNEL:-verifiedsignal:sse}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-verifiedsignal}
      OPENSEARCH_URL: ${OPENSEARCH_URL:-http://opensearch:9200}
      OPENSEARCH_INDEX_NAME: ${OPENSEARCH_INDEX_NAME:-verifiedsignal_documents}
      USE_FAKE_OPENSEARCH: ${USE_FAKE_OPENSEARCH:-false}
      WORKER_LOG_LEVEL: ${WORKER_LOG_LEVEL:-INFO}
      ENQUEUE_SCORE_AFTER_PIPELINE: ${ENQUEUE_SCORE_AFTER_PIPELINE:-true}
      SCORE_ASYNC_BACKEND: ${SCORE_ASYNC_BACKEND:-http}
      SCORE_HTTP_URL: ${SCORE_HTTP_URL:-http://scoring-service:8000/v1/score}
      SCORE_HTTP_BEARER_TOKEN: ${SCORE_HTTP_BEARER_TOKEN:-changeme-scoring-bearer}
      SCORE_HTTP_TIMEOUT_S: ${SCORE_HTTP_TIMEOUT_S:-120}
    volumes:
      - ./config:/app/config:ro
    command: ["pdm", "run", "worker"]

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${WEB_VITE_API_URL:-http://127.0.0.1:8000}
    image: verifiedsignal-web:local
    depends_on:
      app:
        condition: service_started
    ports:
      - "${WEB_PORT:-5173}:80"

  test:
    build: .
    image: verifiedsignal:local
    profiles:
      - test
    env_file:
      - path: .env
        required: false
    environment:
      PYTHONPATH: /app
      VERIFIEDSIGNAL_CONFIG_DIR: /app/config
    volumes:
      - ./config:/app/config:ro
    command: ["pdm", "run", "pytest"]

volumes:
  postgres_data:
  redis_data:
  minio_data:
  opensearch_data:
  scoring_postgres_data:
